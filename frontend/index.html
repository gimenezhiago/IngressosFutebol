<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingressos Futebol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Ingressos Futebol</h1>
        <p>Garanta seu lugar na arquibancada</p>
    </header>

    <main>
        <section>
            <h2 class="section-title">Próximos Jogos</h2>
            <div id="jogos-container">
                <p class="loading">Carregando jogos disponíveis...</p>
                </div>
        </section>
    </main>

    <div id="modal-compra" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharModal()">&times;</span>
            <h2 id="modal-jogo-titulo">Carregando detalhes...</h2>
            <p id="modal-jogo-info" class="text-muted"></p>
            
            <h3 class="section-subtitle">Escolha seu Setor</h3>
            <div id="modal-setores-container">
                </div>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
